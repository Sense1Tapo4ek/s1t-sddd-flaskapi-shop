# Declarative mock data configuration for seed.py
#
# Supported field types:
#   faker           — любой метод Faker: { method: name }
#                     locale опциональна, дефолт ru_RU
#   choice / enum   — случайный выбор из списка values
#   range           — случайное float в [min, max] с precision знаками
#   int_range       — случайное int в [min, max]
#   pattern         — шаблон строки: {d2}=2 цифры, {d3}=3 цифры, {d4}=4 цифры
#   sequence        — "{prefix}{i}" где i = 1..count
#   fixed           — всегда одно значение value
#   download_images — скачивает реальные JPEG с picsum.photos в media/products/
#   placeholder_images — URL picsum без скачивания (офлайн-фоллбэк)

products:
  count: 10
  fields:
    title:
      type: faker
      method: catch_phrase
    price:
      type: range
      min: 199.0
      max: 49999.0
      precision: 2
    description:
      type: faker
      method: text
    images:
      type: download_images
      min: 1
      max: 3
      width: 300
      height: 300

orders:
  count: 15
  fields:
    name:
      type: faker
      method: name
    phone:
      type: faker
      method: phone_number
    comment:
      type: choice
      values:
        - "Позвоните перед доставкой"
        - "Оставьте у двери"
        - "Звонить после 18:00"
        - "Срочно, нужно ASAP"
        - "Без звонка"
        - ""
        - ""
    status:
      type: enum
      values: ["new", "processing", "done", "canceled"]
