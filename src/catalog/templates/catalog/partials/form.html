<div class="modal-overlay" id="product-modal" role="dialog" aria-modal="true" aria-label="Форма товара" onclick="if(event.target===this)this.remove()">
  <div class="modal">
    <div class="modal__header">
      {% if product %}Редактировать товар #{{ product.id }}{% else %}Новый товар{% endif %}
      <button class="btn btn--ghost btn--sm" onclick="document.getElementById('product-modal').remove()" style="float:right">&times;</button>
    </div>
    <div class="modal__body">
      <form
        {% if product %}
          hx-put="/admin/products/{{ product.id }}"
        {% else %}
          hx-post="/admin/products/"
        {% endif %}
        hx-encoding="multipart/form-data"
        hx-target="#product-table-wrap"
        hx-swap="outerHTML">

        <div class="form-group">
          <label class="form-label" for="f-title">Название *</label>
          <input class="form-input" type="text" id="f-title" name="title"
                 value="{{ product.title if product else '' }}" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="f-price">Цена *</label>
          <input class="form-input" type="number" id="f-price" name="price"
                 step="0.01" min="0"
                 value="{{ product.price if product else '' }}" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="f-description">Описание</label>
          <textarea class="form-input form-textarea" id="f-description" name="description" rows="5">{{ product.description if product else '' }}</textarea>
        </div>

        {% if product and product.images %}
        <div class="form-group">
          <label class="form-label">Текущие фотографии</label>
          <div class="image-grid">
            {% for img in product.images %}
            <div class="image-thumb">
              <img src="{{ img }}" alt="" onclick="openLightbox(this.src)">
              <label style="font-size:0.7rem; display:flex; align-items:center; gap:4px; cursor:pointer;">
                <input type="checkbox" name="deleted_images" value="{{ img }}"> Удалить
              </label>
            </div>
            {% endfor %}
          </div>
        </div>
        {% endif %}

        <div class="form-group">
          <label class="form-label" for="f-images">
            {% if product %}Добавить фотографии{% else %}Фотографии{% endif %}
          </label>
          <input class="form-input" type="file" id="f-images"
                 name="{% if product %}new_images{% else %}images{% endif %}"
                 multiple accept="image/*"
                 onchange="previewImages(this)">
          <div class="image-grid" id="image-preview" style="margin-top:8px"></div>
        </div>

        <div class="modal__footer" style="margin-top:1rem;">
          <button class="btn btn--ghost" type="button"
                  onclick="document.getElementById('product-modal').remove()">Отмена</button>
          <button class="btn btn--primary" type="submit">
            {% if product %}Сохранить{% else %}Создать{% endif %}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
function previewImages(input) {
  var container = document.getElementById('image-preview');
  container.innerHTML = '';
  Array.from(input.files).forEach(function(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var div = document.createElement('div');
      div.className = 'image-thumb';
      var img = document.createElement('img');
      img.src = e.target.result;
      img.onclick = function() { openLightbox(this.src); };
      div.appendChild(img);
      container.appendChild(div);
    };
    reader.readAsDataURL(file);
  });
}
</script>
