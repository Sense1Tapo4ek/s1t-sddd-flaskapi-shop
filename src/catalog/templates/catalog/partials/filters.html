<div class="toolbar" style="margin-bottom: 16px;">
  <form hx-get="/admin/products/table"
        hx-target="#product-table-wrap"
        hx-swap="outerHTML"
        hx-trigger="submit, change delay:600ms"
        style="display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap;">
    <div class="form-group" style="margin: 0;">
      <label class="form-label" for="filter-title">Название</label>
      <input class="form-input form-input--sm" type="text" id="filter-title"
             name="title__ilike" placeholder="Поиск по названию..."
             value="{{ request.args.get('title__ilike', '') }}">
    </div>
    <div class="form-group" style="margin: 0;">
      <label class="form-label" for="filter-price-min">Цена от</label>
      <input class="form-input form-input--sm" type="number" id="filter-price-min"
             name="price__gte" step="0.01" placeholder="0"
             value="{{ request.args.get('price__gte', '') }}">
    </div>
    <div class="form-group" style="margin: 0;">
      <label class="form-label" for="filter-price-max">Цена до</label>
      <input class="form-input form-input--sm" type="number" id="filter-price-max"
             name="price__lte" step="0.01" placeholder="999"
             value="{{ request.args.get('price__lte', '') }}">
    </div>
    <button class="btn btn--ghost btn--sm" type="submit">Найти</button>
    <a class="btn btn--ghost btn--sm"
       hx-get="/admin/products/table"
       hx-target="#product-table-wrap"
       hx-swap="outerHTML">Сбросить</a>
  </form>
</div>
