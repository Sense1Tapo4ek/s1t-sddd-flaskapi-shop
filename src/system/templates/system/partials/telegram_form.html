<form hx-put="/admin/settings/telegram"
      hx-target="this"
      hx-swap="outerHTML"
      class="form form--wide">

  <section class="form-section">
    <h3 class="form-section__title">Настройка бота</h3>

    <div style="font-size:13px; color:var(--color-text-muted); margin-bottom:24px; line-height:1.8;">
      1. Создайте бота через <a href="https://t.me/BotFather" target="_blank" style="color:var(--color-accent);">@BotFather</a> и скопируйте токен.<br>
      2. Вставьте токен в поле ниже.<br>
      3. Каждый администратор привязывает свой Chat ID на странице аккаунта.
    </div>

    <div class="form-group">
      <label class="form-label" for="bot_token">Токен бота</label>
      <input class="form-input" type="text" id="bot_token" name="bot_token"
             placeholder="1234567890:ABCdefGhIJKlmNoPQRsTUVwxyZ"
             value="{{ settings.telegram.bot_token }}">
    </div>

  </section>

  <div class="form-actions" style="margin-bottom:48px;">
    <button class="btn btn--primary" type="submit">Сохранить</button>
  </div>
</form>
