<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — {{ app_name }}</title>
    <link rel="stylesheet" href="/static/css/vars.css">
    <link rel="stylesheet" href="/static/css/components/forms.css">
    <link rel="stylesheet" href="/static/css/components/buttons.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: var(--color-bg); }
        .login-card { background: var(--color-surface); padding: 2rem; border-radius: var(--radius); box-shadow: var(--shadow-md); width: 100%; max-width: 360px; }
        .login-card h1 { margin: 0 0 1.5rem; font-size: 1.25rem; color: var(--color-text); }

        .error-msg {
            color: var(--color-danger);
            font-size: 0.8125rem;
            min-height: 1.25em;
            margin-bottom: 0.75rem;
            display: none;
        }
        .error-msg:not(:empty) { display: block; }

        .password-wrap { position: relative; }
        .password-wrap .form-input { padding-right: 2.5rem; }
        .password-toggle {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--color-text-muted);
            padding: 0;
        }
        .password-toggle:hover { color: var(--color-text); }
        .password-toggle svg { width: 16px; height: 16px; pointer-events: none; }

        .recovery-desc { font-size: 0.875rem; color: var(--color-text-muted); line-height: 1.6; margin-bottom: 1rem; }
        .recovery-actions { display: flex; gap: 8px; }
        .recovery-actions .btn { flex: 1; }
        .forgot-link { margin-top: 0.75rem; text-align: center; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>{{ app_name }}</h1>

        <div id="login-form">
            <form hx-post="/admin/login" hx-target="#login-error" hx-swap="none">
                <div class="form-group">
                    <label class="form-label" for="login">Логин</label>
                    <input class="form-input" type="text" id="login" name="login" required autofocus
                           autocomplete="username">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Пароль</label>
                    <div class="password-wrap">
                        <input class="form-input" type="password" id="password" name="password" required
                               autocomplete="current-password">
                        <button type="button" class="password-toggle" onclick="togglePassword()"
                                aria-label="Показать пароль" title="Показать пароль">
                            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M10 3C5 3 1.73 7.11 1.05 9.82a1 1 0 0 0 0 .36C1.73 12.89 5 17 10 17s8.27-4.11 8.95-6.82a1 1 0 0 0 0-.36C18.27 7.11 15 3 10 3zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm0-6a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"/>
                            </svg>
                            <svg id="eye-off-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" style="display:none">
                                <path d="M2.22 2.22a.75.75 0 0 0-1.06 1.06l2.62 2.62C2.29 7.38 1.07 8.8.55 10c.68 2.71 3.95 7 9.45 7a9.2 9.2 0 0 0 4.55-1.2l2.25 2.25a.75.75 0 1 0 1.06-1.06L2.22 2.22zM10 14a4 4 0 0 1-3.9-3.12L9.88 14A4 4 0 0 1 10 14zm7.4-3.18C16.27 13 13.1 17 10 17a8.5 8.5 0 0 1-2.77-.48l1.56 1.56A9.2 9.2 0 0 0 10 18.5c5.5 0 8.77-4.29 9.45-7a9.6 9.6 0 0 0-2.05-3.68zM10 6a4 4 0 0 1 3.9 3.12l1.55 1.55A9.6 9.6 0 0 0 10 4.5c-.87 0-1.71.13-2.5.36L9.13 6.5A4 4 0 0 1 10 6z"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <label style="display:flex;align-items:center;gap:8px;margin:4px 0 14px;font-size:13px;color:var(--color-text-muted);">
                    <input type="checkbox" name="remember_me">
                    <span>Запомнить меня на 30 дней</span>
                </label>
                <div class="error-msg" id="login-error"></div>
                <div class="form-actions">
                    <button class="btn btn--primary" type="submit" style="width:100%">Войти</button>
                </div>
            </form>
            <div class="forgot-link">
                <button class="btn btn--ghost btn--sm" type="button"
                        onclick="showRecovery()">Войти через Telegram</button>
            </div>
        </div>

        <div id="recovery-section" style="display:none">
            <p class="recovery-desc">
                Одноразовый код для входа будет отправлен в Telegram, привязанный к указанному логину.
                Код действителен {{ recovery_code_ttl_minutes }} мин.
            </p>
            <div class="form-group">
                <label class="form-label" for="telegram-login">Логин</label>
                <input class="form-input" type="text" id="telegram-login" name="login"
                       autocomplete="username" required>
            </div>
            <label style="display:flex;align-items:center;gap:8px;margin:4px 0 14px;font-size:13px;color:var(--color-text-muted);">
                <input type="checkbox" id="telegram-remember" name="remember_me">
                <span>Запомнить меня на 30 дней</span>
            </label>
            <div class="error-msg" id="recovery-error"></div>
            <div class="recovery-actions">
                <button class="btn btn--ghost" type="button" onclick="hideRecovery()">Отмена</button>
                <button class="btn btn--primary" type="button"
                        hx-post="/admin/telegram/request-code"
                        hx-include="#telegram-login, #telegram-remember"
                        hx-target="#recovery-section"
                        hx-swap="innerHTML">Получить код</button>
            </div>
        </div>
    </div>

    <script>
    function togglePassword() {
        var input = document.getElementById('password');
        var eyeOn  = document.getElementById('eye-icon');
        var eyeOff = document.getElementById('eye-off-icon');
        var isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        eyeOn.style.display  = isHidden ? 'none' : '';
        eyeOff.style.display = isHidden ? '' : 'none';
    }

    function showLoginError(msg) {
        var el = document.getElementById('login-error');
        el.textContent = msg || 'Ошибка сервера';
    }

    function showRecovery() {
        var login = document.getElementById('login');
        var tgLogin = document.getElementById('telegram-login');
        if (login && tgLogin && login.value && !tgLogin.value) tgLogin.value = login.value;
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('recovery-section').style.display = '';
    }
    function hideRecovery() {
        document.getElementById('recovery-section').style.display = 'none';
        document.getElementById('login-form').style.display = '';
    }

    document.body.addEventListener('htmx:responseError', function(e) {
        var msg = 'Ошибка сервера';
        try {
            var trigger = e.detail.xhr.getResponseHeader('HX-Trigger');
            if (trigger) {
                var parsed = JSON.parse(trigger);
                if (parsed.showToast) msg = parsed.showToast.message;
            }
        } catch(_) {}
        showLoginError(msg);
    });
    </script>
</body>
</html>
