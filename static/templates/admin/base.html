<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/static/css/vars.css">
  <!-- <link rel="stylesheet" href="/static/css/themes/neutral.css"> -->
  <link rel="stylesheet" href="/static/css/layout.css">
  <link rel="stylesheet" href="/static/css/components/buttons.css">
  <link rel="stylesheet" href="/static/css/components/forms.css">
  <link rel="stylesheet" href="/static/css/components/tables.css">
  <link rel="stylesheet" href="/static/css/components/badges.css">
  <link rel="stylesheet" href="/static/css/components/images.css">
  <link rel="stylesheet" href="/static/css/components/modals.css">
  <link rel="stylesheet" href="/static/css/components/toasts.css">
  <link rel="stylesheet" href="/static/css/components/utils.css">
  <link rel="stylesheet" href="/static/css/components/smart-table.css">
  <link rel="stylesheet" href="/static/vendor/cropper.min.css">
  <link rel="stylesheet" href="/static/css/image-editor.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar__brand">
        <span class="sidebar__logo">{{ app_name }}</span>
        <span class="sidebar__sub">Админ панель</span>
      </div>
      <nav class="sidebar__nav">
        <a href="/admin/products/" class="nav-link {% if active == 'products' %}nav-link--active{% endif %}">Товары</a>
        <a href="/admin/orders/" class="nav-link {% if active == 'orders' %}nav-link--active{% endif %}" style="display: flex; justify-content: space-between; align-items: center;">
          <span>Заказы</span>
          <span
            id="orders-badge"
            hx-get="/admin/orders/badge"
            hx-trigger="load, every 30s"
            hx-swap="innerHTML"></span>
        </a>

        <div class="sidebar__section-title">Настройки</div>
        <a href="/admin/settings/store" class="nav-link {% if active == 'settings' and tab == 'store' %}nav-link--active{% endif %}">Магазин</a>
        <a href="/admin/settings/telegram" class="nav-link {% if active == 'settings' and tab == 'telegram' %}nav-link--active{% endif %}">Оповещения</a>
        <a href="/admin/settings/security" class="nav-link {% if active == 'settings' and tab == 'security' %}nav-link--active{% endif %}">Безопасность</a>
        <a href="/admin/help" class="nav-link {% if active == 'help' %}nav-link--active{% endif %}">Помощь</a>
      </nav>
      <div class="sidebar__footer">
        <a href="#"
          class="nav-link"
          hx-delete="/admin/logout"
          hx-confirm="Выйти из панели?"
          style="color:var(--color-text-muted);">Выйти</a>
      </div>
    </aside>
    <main class="content">
      <div class="content__inner">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>

  <div id="modal-container"></div>

  <!-- Global confirm modal (used by showConfirmModal) -->
  <div class="modal-overlay" id="globalModalOverlay" role="dialog" aria-modal="true" aria-labelledby="globalModalTitle">
    <div class="modal">
      <div class="modal__header"><span id="globalModalTitle"></span></div>
      <div class="modal__body"><p id="globalModalText" style="white-space:pre-line; color:var(--color-text-muted); font-size:13px;"></p></div>
      <div class="modal__footer">
        <button id="globalModalCancel" class="btn btn--ghost">Отмена</button>
        <button id="globalModalConfirm" class="btn btn--primary">Подтвердить</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="/static/vendor/cropper.min.js"></script>
  <script src="/static/js/image-editor.js"></script>
  <script src="/static/js/lightbox.js"></script>
  <script src="/static/js/modal.js"></script>
  <script>
  document.body.addEventListener("showToast", function(e) {
      var d = e.detail, el = document.createElement("div");
      el.className = "toast toast--" + (d.type || "info");
      el.textContent = d.message;
      document.getElementById("toast-container").appendChild(el);
      setTimeout(function() { el.remove(); }, d.type === "error" ? 6000 : 4000);
  });

  // Global HTMX error handler — process HX-Trigger on non-2xx responses
  document.body.addEventListener("htmx:beforeSwap", function(e) {
      var xhr = e.detail.xhr;
      if (xhr.status >= 400) {
          // Let HTMX process response headers (HX-Trigger with showToast)
          e.detail.shouldSwap = false;
          e.detail.isError = false;
          // Manually fire HX-Trigger events from error response
          var trigger = xhr.getResponseHeader("HX-Trigger");
          if (trigger) {
              try {
                  var parsed = JSON.parse(trigger);
                  Object.keys(parsed).forEach(function(eventName) {
                      document.body.dispatchEvent(
                          new CustomEvent(eventName, { detail: parsed[eventName] })
                      );
                  });
              } catch(_) {}
          }
      }
  });

  // Fallback for HTMX requests that fail without HX-Trigger
  document.body.addEventListener("htmx:responseError", function(e) {
      var xhr = e.detail.xhr;
      var trigger = xhr && xhr.getResponseHeader("HX-Trigger");
      if (trigger) return; // Already handled by beforeSwap
      var msg = "Ошибка сервера";
      try {
          var data = JSON.parse(xhr.responseText);
          if (data.message) msg = data.message;
      } catch(_) {}
      document.body.dispatchEvent(new CustomEvent("showToast", {
          detail: { message: msg, type: "error" }
      }));
  });

  // Loading state for HTMX form submissions
  document.body.addEventListener("htmx:beforeRequest", function(e) {
      var btn = e.detail.elt.querySelector('button[type="submit"]') || e.detail.elt;
      if (btn && btn.classList) btn.classList.add("btn--loading");
  });
  document.body.addEventListener("htmx:afterRequest", function(e) {
      var btn = e.detail.elt.querySelector('button[type="submit"]') || e.detail.elt;
      if (btn && btn.classList) btn.classList.remove("btn--loading");
  });

  document.body.addEventListener("closeModal", function() {
      document.getElementById("modal-container").innerHTML = "";
  });

  document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") {
          document.querySelectorAll(".modal-overlay--active").forEach(function(m) {
              m.classList.remove("modal-overlay--active");
          });
          document.getElementById("modal-container").innerHTML = "";
      }
  });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
